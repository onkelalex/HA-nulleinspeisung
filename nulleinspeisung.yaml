blueprint:
  name: Nulleinspeisung MS-A2
  description: >
    Ultra-Stabile Nulleinspeisung gegen Oszillationen. 
    Optimiert für Tibber Pulse und ähnliche Cloud-Sensoren.
    Version-ID: 202603121443
  domain: automation
  input:
    grid_sensor:
      name: Netz-Sensor (Watt)
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_soc_sensor:
      name: Batterie Ladestand (SoC %)
      selector:
        entity:
          domain: sensor
          device_class: battery
    min_soc:
      name: Minimum SoC (%)
      default: 10
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    battery_mode_select:
      name: MS-A2 Modus Entität
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: MS-A2 Leistungs-Limit
      selector:
        entity:
          domain: number
    deadband:
      name: Totzone / Hysterese (Watt)
      description: Ignoriert Schwankungen am Netz-Sensor innerhalb dieses Bereichs.
      default: 30
      selector:
        number:
          min: 0
          max: 150
          step: 5
          unit_of_measurement: W
          mode: slider
    max_charge_power:
      name: Max Ladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
          mode: box
    max_discharge_power:
      name: Max Entladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
          mode: box
    control_gain:
      name: Dämpfungsfaktor (Regler)
      description: Empfehlung für Tibber oder Pulse Nutzer zwischen 0.1 und 0.2.
      default: 0.15
      selector:
        number:
          min: 0.01
          max: 0.5
          step: 0.01
          mode: slider
    update_interval:
      name: Regel-Intervall (Sekunden)
      description: Zeit zwischen zwei Befehlen an die Batterie.
      default: 5
      selector:
        number:
          min: 2
          max: 20
          step: 1
          unit_of_measurement: s
          mode: slider

mode: restart

trigger:
  - platform: time_pattern
    seconds: "/1"

variables:
  grid_ent: !input grid_sensor
  soc_ent: !input battery_soc_sensor
  limit_ent: !input battery_power_limit_number
  chg_val: !input max_charge_power
  dis_val: !input max_discharge_power
  gain_val: !input control_gain
  interval_val: !input update_interval
  min_soc_val: !input min_soc
  deadband_val: !input deadband

action:
  # Intervall-Garantie via Modulo
  - condition: template
    value_template: "{{ (as_timestamp(now()) | int) % (interval_val | int) == 0 }}"

  # 1. Modus auf 'mqtt_ctrl' erzwingen
  - action: select.select_option
    target:
      entity_id: !input battery_mode_select
    data:
      option: "mqtt_ctrl"
