blueprint:
  name: Nulleinspeisung MS-A2 (Intervall-Garantie)
  description: >
    Präzise Nulleinspeisung für den MS-A2. 
    Diese Version garantiert die Einhaltung des Sende-Intervalls.
  domain: automation
  input:
    grid_sensor:
      name: Netz-Sensor (Watt)
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_soc_sensor:
      name: Batterie Ladestand (SoC %)
      selector:
        entity:
          domain: sensor
          device_class: battery
    min_soc:
      name: Minimum SoC (%)
      default: 10
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    battery_mode_select:
      name: MS-A2 Modus Entität
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: MS-A2 Leistungs-Limit
      selector:
        entity:
          domain: number
    deadband:
      name: Totzone / Hysterese (Watt)
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: W
          mode: slider
    max_charge_power:
      name: Max Ladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
          mode: box
    max_discharge_power:
      name: Max Entladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
          mode: box
    control_gain:
      name: Dämpfungsfaktor (Regler)
      default: 0.2
      selector:
        number:
          min: 0.05
          max: 1.0
          step: 0.05
          mode: slider
    update_interval:
      name: Regel-Intervall (Sekunden)
      default: 3
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: s
          mode: slider

# WICHTIG: 'single' Modus verhindert parallele Ausführungen
mode: single

trigger:
  # Wir triggern NUR noch über die Zeit, um volle Kontrolle zu haben
  - platform: time_pattern
    seconds: "/1"

variables:
  grid_ent: !input grid_sensor
  soc_ent: !input battery_soc_sensor
  limit_ent: !input battery_power_limit_number
  chg_val: !input max_charge_power
  dis_val: !input max_discharge_power
  gain_val: !input control_gain
  interval_val: !input update_interval
  min_soc_val: !input min_soc
  deadband_val: !input deadband

action:
  # Die Bedingung prüft nun hart gegen den Zeitstempel
  - condition: template
    value_template: >
      {% set last_run = as_timestamp(state_attr('automation.' ~ this.entity_id, 'last_triggered') | default('1970-01-01 00:00:00', true)) %}
      {{ (as_timestamp(now()) - last_run) | round(0, 'floor') >= (interval_val | float) }}

  # 1. Modus auf 'mqtt_ctrl' erzwingen
  - action: select.select_option
    target:
      entity_id: !input battery_mode_select
    data:
      option: "mqtt_ctrl"

  # 2. Wert berechnen und senden
  - action: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: >-
        {% set grid_p = states(grid_ent) | float(0) %}
        {% set current_soc = states(soc_ent) | float(0) %}
        {% set current_limit = states(limit_ent) | float(0) %}
        {% set max_chg = chg_val | float * -1 %}
        {% set max_dis = dis_val | float %}
        {% set gain = gain_val | float %}
        {% set deadband = deadband_val | float %}
        {% set min_soc = min_soc_val | float %}
        {% if grid_p | abs < deadband %}
          {% set correction = 0 %}
        {% else %}
          {% set effective_grid = grid_p - (deadband if grid_p > 0 else -deadband) %}
          {% set correction = effective_grid * gain %}
        {% endif %}
        {% set raw_limit = (current_limit + correction) | round(1) %}
        {% if current_soc <= min_soc %}
          {% set raw_limit = [0, raw_limit] | min %}
        {% endif %}
        {% set limited = ([max_chg, ([max_dis, raw_limit] | min)] | max) %}
        {% if (limited - current_limit) | abs < 0.1 %}
          {{ ((limited + 0.1) if limited < max_dis else (limited - 0.1)) | round(1) }}
        {% else %}
          {{ limited | round(1) }}
        {% endif %}
