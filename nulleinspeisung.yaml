blueprint:
  name: Nulleinspeisung MS-A2 (MQTT Watchdog)
  description: >
    Spezielle Nulleinspeisung für Hoymiles MS-A2. Hält den Modus 'mqtt_ctrl' aktiv,
    indem alle 30 Sekunden ein Wert gesendet wird.
  domain: automation
  input:
    grid_sensor:
      name: Netz-Sensor (Watt)
      description: Positiv = Bezug, Negativ = Einspeisung.
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_mode_select:
      name: MS-A2 Modus Entität
      description: Die 'select' Entität für den EMS-Modus (general, mqtt_ctrl, tou_plan).
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: MS-A2 Leistungs-Limit
      description: Die 'number' Entität für das Watt-Limit (power_ctrl/set).
      selector:
        entity:
          domain: number
    max_charge_power:
      name: Max Ladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
    max_discharge_power:
      name: Max Entladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W

mode: restart

trigger:
  - platform: state
    entity_id: !input grid_sensor
  - platform: time_pattern
    seconds: "/30" # Watchdog: Sendet spätestens alle 30s, um 'mqtt_ctrl' zu halten

variables:
  grid_p: "{{ states(grid_sensor) | float(0) }}"
  current_limit: "{{ states(battery_power_limit_number) | float(0) }}"
  max_chg: "{{ ( !input max_charge_power ) * -1 }}"
  max_dis: !input max_discharge_power
  
  # Berechnung des neuen Limits
  raw_limit: "{{ (current_limit + grid_p) | round(1) }}"
  
  # Begrenzung und Watchdog-Trick: 
  # Wir addieren eine winzige Nuance (0.1), falls der Wert gleich bleibt, 
  # damit der MS-A2 eine "Änderung" sieht und den Timeout zurücksetzt.
  final_limit: >
    {% set limited = ([max_chg, ([max_dis, raw_limit] | min)] | max) %}
    {% if limited == current_limit %}
      {{ (limited + 0.1) if limited < max_dis else (limited - 0.1) }}
    {% else %}
      {{ limited }}
    {% endif %}

action:
  # 1. Modus auf 'mqtt_ctrl' erzwingen
  - service: select.select_option
    target:
      entity_id: !input battery_mode_select
    data:
      option: "mqtt_ctrl"

  # 2. Wert an die Batterie senden
  - service: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: "{{ final_limit | float }}"
