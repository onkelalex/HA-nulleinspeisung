blueprint:
  name: Nulleinspeisung MS-A2 (High-Speed & Sanft)
  description: >
    Präzise Nulleinspeisung für den MS-A2. 
    Intervall begrenzt auf 1-15 Sekunden für optimale Reaktionszeit.
    Tipp: Bei schnellen Intervallen (1-3s) den Dämpfungsfaktor niedrig einstellen (0.1 - 0.2).
  domain: automation
  input:
    grid_sensor:
      name: Netz-Sensor (Watt)
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_mode_select:
      name: MS-A2 Modus Entität
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: MS-A2 Leistungs-Limit
      selector:
        entity:
          domain: number
    max_charge_power:
      name: Max Ladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
          mode: box
    max_discharge_power:
      name: Max Entladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
          mode: box
    control_gain:
      name: Dämpfungsfaktor (Regler)
      description: >
        Wie viel % der Abweichung pro Schritt korrigiert wird. 
        Empfehlung für schnelles Intervall: 0.1 bis 0.2.
      default: 0.2
      selector:
        number:
          min: 0.05
          max: 1.0
          step: 0.05
          mode: slider
    update_interval:
      name: Regel-Intervall (Sekunden)
      description: Wie oft soll der Wert gesendet werden? (Begrenzt auf 1-15s).
      default: 2
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: s
          mode: slider

mode: restart

trigger:
  - platform: state
    entity_id: !input grid_sensor
  - platform: time_pattern
    seconds: "/1"

variables:
  grid_ent: !input grid_sensor
  limit_ent: !input battery_power_limit_number
  chg_val: !input max_charge_power
  dis_val: !input max_discharge_power
  gain_val: !input control_gain
  interval_val: !input update_interval

action:
  # Prüfen, ob das Intervall abgelaufen ist
  - condition: template
    value_template: >
      {% set last_run = state_attr('automation.' ~ this.entity_id, 'last_triggered') %}
      {{ last_run is none or (now() - last_run).total_seconds() >= interval_val | float }}

  # 1. Modus auf 'mqtt_ctrl' erzwingen (Watchdog)
  - action: select.select_option
    target:
      entity_id: !input battery_mode_select
    data:
      option: "mqtt_ctrl"

  # 2. Wert berechnen und senden
  - action: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: >
        {% set grid_p = states(grid_ent) | float(0) %}
        {% set current_limit = states(limit_ent) | float(0) %}
        {% set max_chg = chg_val | float * -1 %}
        {% set max_dis = dis_val | float %}
        {% set gain = gain_val | float %}
        
        {# Sanfte Korrektur basierend auf dem Gain #}
        {% set correction = grid_p * gain %}
        {% set raw_limit = (current_limit + correction) | round(1) %}
        
        {# Grenzen einhalten #}
        {% set limited = ([max_chg, ([max_dis, raw_limit] | min)] | max) %}
        
        {# Watchdog-Trick: Immer eine minimale Änderung erzwingen #}
        {% if (limited - current_limit) | abs < 0.1 %}
          {{ ((limited + 0.1) if limited < max_dis else (limited - 0.1)) | round(1) }}
        {% else %}
          {{ limited | round(1) }}
        {% endif %}
