blueprint:
  name: Nulleinspeisung AC-System (PV + Batterie getrennt)
  description: >
    Regelt eine Batterie (z.B. Hoymiles MS-A2 via MQTT) so, dass der Netzbezug/Einspeisung 
    bei 0W liegt. Die PV-Wechselrichter speisen unabhängig ins Netz ein.
  domain: automation
  input:
    grid_sensor:
      name: Netz-Sensor (Watt)
      description: Sensor am Hausanschluss. Positiv = Bezug, Negativ = Einspeisung.
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_control_switch:
      name: Batterie Modus Schalter
      description: Der Schalter, um den MS-A2 in den 'ctrl' (Control) Modus zu versetzen.
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: Batterie Leistungs-Limit (Watt)
      description: Die Entität (MQTT Number), die die Watt-Vorgabe der Batterie steuert.
      selector:
        entity:
          domain:
            - number
            - input_number
    max_charge_power:
      name: Maximale Ladeleistung (Watt)
      description: Wie viel Watt darf die Batterie maximal aufnehmen? (Eingabe als positiver Wert, z.B. 800)
      default: 800
      selector:
        number:
          min: 0
          max: 3000
          unit_of_measurement: W
    max_discharge_power:
      name: Maximale Entladeleistung (Watt)
      description: Wie viel Watt darf die Batterie maximal abgeben? (z.B. 800)
      default: 800
      selector:
        number:
          min: 0
          max: 3000
          unit_of_measurement: W
    deadband:
      name: Totzone (Watt)
      description: Regelung erst ab einer Abweichung von X Watt (verhindert ständiges Hin- und Herregeln).
      default: 10
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: W

mode: restart

trigger:
  - platform: state
    entity_id: !input grid_sensor
  - platform: time_pattern
    seconds: "/5" # Schnelle Regelung für AC-Systeme empfohlen

variables:
  grid_p: "{{ states(grid_sensor) | float(0) }}"
  current_limit: "{{ states(battery_power_limit_number) | float(0) }}"
  max_chg: "{{ ( !input max_charge_power ) * -1 }}" # Umwandlung in Negativwert für Laden
  max_dis: !input max_discharge_power
  dead: !input deadband
  
  # Die Magie: Neues Limit = Altes Limit + Netzabweichung
  # Wenn grid_p = -300 (Einspeisung), sinkt das Limit (Laden).
  # Wenn grid_p = +500 (Bezug), steigt das Limit (Entladen).
  raw_new_limit: "{{ (current_limit + grid_p) | round(0) }}"
  
  # Begrenzung auf die eingestellten Max-Werte
  final_limit: "{{ ([max_chg, ([max_dis, raw_new_limit] | min)] | max) }}"

action:
  # 1. Sicherstellen, dass der Modus auf 'ctrl' steht (Hoymiles MS-A2 Anforderung)
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ states(battery_control_switch) != 'ctrl' }}"
        sequence:
          - service: select.select_option
            target:
              entity_id: !input battery_control_switch
            data:
              option: "ctrl"
    default: []

  # 2. Nur regeln, wenn die Abweichung außerhalb der Totzone liegt
  - condition: template
    value_template: "{{ (grid_p | abs) > dead }}"

  # 3. Das neue Limit an die Batterie senden
  - service: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: "{{ final_limit }}"
