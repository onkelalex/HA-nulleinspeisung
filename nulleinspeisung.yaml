blueprint:
  name: Nulleinspeisung MS-A2 (MQTT Watchdog)
  description: >
    Spezielle Nulleinspeisung für Hoymiles MS-A2. Hält den Modus 'mqtt_ctrl' aktiv,
    indem alle 30 Sekunden ein Wert gesendet wird.
  domain: automation
  input:
    grid_sensor:
      name: Netz-Sensor (Watt)
      description: Positiv = Bezug, Negativ = Einspeisung.
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_mode_select:
      name: MS-A2 Modus Entität
      description: Die 'select' Entität für den EMS-Modus (general, mqtt_ctrl, tou_plan).
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: MS-A2 Leistungs-Limit
      description: Die 'number' Entität für das Watt-Limit (power_ctrl/set).
      selector:
        entity:
          domain: number
    max_charge_power:
      name: Max Ladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
    max_discharge_power:
      name: Max Entladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W

mode: restart

trigger:
  - platform: state
    entity_id: !input grid_sensor
  - platform: time_pattern
    seconds: "/30"

variables:
  # Hier weisen wir die Inputs erst einfachen Variablen zu, um das '!' Problem zu umgehen
  grid_sensor_entity: !input grid_sensor
  limit_entity: !input battery_power_limit_number
  max_chg_input: !input max_charge_power
  max_dis_input: !input max_discharge_power
  
  # Jetzt nutzen wir diese Variablen in den Berechnungen
  grid_p: "{{ states(grid_sensor_entity) | float(0) }}"
  current_limit: "{{ states(limit_entity) | float(0) }}"
  max_chg: "{{ max_chg_input | float * -1 }}"
  max_dis: "{{ max_dis_input | float }}"
  
  # Berechnung des neuen Limits
  raw_limit: "{{ (current_limit + grid_p) | round(1) }}"
  
  # Watchdog-Logik: Wert minimal ändern, um den MS-A2 Timer zu resetten
  final_limit: >
    {% set limited = ([max_chg, ([max_dis, raw_limit] | min)] | max) %}
    {% if (limited - current_limit) | abs < 0.1 %}
      {{ (limited + 0.1) if limited < max_dis else (limited - 0.1) }}
    {% else %}
      {{ limited }}
    {% endif %}

action:
  - service: select.select_option
    target:
      entity_id: !input battery_mode_select
    data:
      option: "mqtt_ctrl"

  - service: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: >
        {% set grid_p = states(grid_ent) | float(0) %}
        {% set current_limit = states(limit_ent) | float(0) %}
        {% set max_chg = chg_val | float * -1 %}
        {% set max_dis = dis_val | float %}
        {% set raw_limit = (current_limit + grid_p) | round(1) %}
        {% set limited = ([max_chg, ([max_dis, raw_limit] | min)] | max) %}
        {% if (limited - current_limit) | abs < 0.1 %}
          {{ ((limited + 0.1) if limited < max_dis else (limited - 0.1)) | round(1) }}
        {% else %}
          {{ limited | round(1) }}
        {% endif %}
    # Das ist der korrekte Weg, Inputs in Actions zu nutzen:
    variables:
      grid_ent: !input grid_sensor
      limit_ent: !input battery_power_limit_number
      chg_val: !input max_charge_power
      dis_val: !input max_discharge_power

  - service: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: "{{ final_limit | float }}"
