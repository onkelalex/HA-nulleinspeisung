blueprint:
  name: Nulleinspeisung MS-A2 (Gedämpft & Schnell)
  description: >
    Optimierte Regelung für den MS-A2. Nutzt einen Dämpfungsfaktor (Gain), 
    um Schwingungen zu vermeiden, und reagiert schneller auf Änderungen.
    Hält den Modus 'mqtt_ctrl' aktiv.
  domain: automation
  input:
    grid_sensor:
      name: Netz-Sensor (Watt)
      description: Sensor am Hausanschluss. Positiv = Bezug, Negativ = Einspeisung.
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_mode_select:
      name: MS-A2 Modus Entität
      description: Die 'select' Entität für den EMS-Modus (general, mqtt_ctrl, tou_plan).
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: MS-A2 Leistungs-Limit
      description: Die 'number' Entität für das Watt-Limit (power_ctrl/set).
      selector:
        entity:
          domain: number
    max_charge_power:
      name: Max Ladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
    max_discharge_power:
      name: Max Entladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
    control_gain:
      name: Dämpfungsfaktor (Regler)
      description: >
        Bestimmt, wie viel der Abweichung pro Schritt korrigiert wird. 
        1.0 = 100% (schnell, neigt zum Schwingen). 
        0.5 = 50% (sehr ruhig, braucht mehrere Schritte zum Ziel).
      default: 0.7
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.05
          mode: slider

mode: restart

trigger:
  - platform: state
    entity_id: !input grid_sensor
  - platform: time_pattern
    seconds: "/5" # Schneller Zyklus für präzise Regelung

variables:
  # Zuweisung der Inputs an Variablen
  grid_ent: !input grid_sensor
  limit_ent: !input battery_power_limit_number
  chg_val: !input max_charge_power
  dis_val: !input max_discharge_power
  gain_val: !input control_gain

action:
  # 1. Modus auf 'mqtt_ctrl' erzwingen (Watchdog-Funktion)
  - action: select.select_option
    target:
      entity_id: !input battery_mode_select
    data:
      option: "mqtt_ctrl"

  # 2. Gedämpften Wert berechnen und senden
  - action: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: >
        {% set grid_p = states(grid_ent) | float(0) %}
        {% set current_limit = states(limit_ent) | float(0) %}
        {% set max_chg = chg_val | float * -1 %}
        {% set max_dis = dis_val | float %}
        {% set gain = gain_val | float %}
        
        {# Wir korrigieren nur einen Teil der Abweichung basierend auf dem Regler #}
        {% set correction = grid_p * gain %}
        {% set raw_limit = (current_limit + correction) | round(1) %}
        
        {# Grenzen einhalten #}
        {% set limited = ([max_chg, ([max_dis, raw_limit] | min)] | max) %}
        
        {# Watchdog-Trick: Immer eine minimale Änderung erzwingen, falls der Wert stagniert #}
        {% if (limited - current_limit) | abs < 0.1 %}
          {{ ((limited + 0.1) if limited < max_dis else (limited - 0.1)) | round(1) }}
        {% else %}
          {{ limited | round(1) }}
        {% endif %}
