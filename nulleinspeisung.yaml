blueprint:
  name: Nulleinspeisung MS-A2
  description: >
    Ultra-Stabile Nulleinspeisung für den MS-A2. 
    Nutzt gleitende Mittelwerte zur Reduzierung von Oszillationen.
    Version-ID: 202603121434
  domain: automation
  input:
    # (Inputs bleiben gleich wie zuvor)
    grid_sensor:
      name: Netz-Sensor (Watt)
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_soc_sensor:
      name: Batterie Ladestand (SoC %)
      selector:
        entity:
          domain: sensor
          device_class: battery
    min_soc:
      name: Minimum SoC (%)
      default: 10
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    battery_mode_select:
      name: MS-A2 Modus Entität
      selector:
        entity:
          domain: select
    battery_power_limit_number:
      name: MS-A2 Leistungs-Limit
      selector:
        entity:
          domain: number
    deadband:
      name: Totzone / Hysterese (Watt)
      default: 30
      selector:
        number:
          min: 0
          max: 150
          step: 5
          unit_of_measurement: W
          mode: slider
    max_charge_power:
      name: Max Ladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
    max_discharge_power:
      name: Max Entladeleistung (Watt)
      default: 800
      selector:
        number:
          min: 0
          max: 2000
          unit_of_measurement: W
    control_gain:
      name: Dämpfungsfaktor (Regler)
      description: Für Tibber/Pulse-User empfohlen 0.1 bis 0.2.
      default: 0.15
      selector:
        number:
          min: 0.01
          max: 0.5
          step: 0.01
          mode: slider
    update_interval:
      name: Regel-Intervall (Sekunden)
      default: 4
      selector:
        number:
          min: 2
          max: 20
          step: 1
          unit_of_measurement: s
          mode: slider

mode: restart

trigger:
  - platform: time_pattern
    seconds: "/1"

variables:
  grid_ent: !input grid_sensor
  soc_ent: !input battery_soc_sensor
  limit_ent: !input battery_power_limit_number
  chg_val: !input max_charge_power
  dis_val: !input max_discharge_power
  gain_val: !input control_gain
  interval_val: !input update_interval
  min_soc_val: !input min_soc
  deadband_val: !input deadband

action:
  - condition: template
    value_template: "{{ (as_timestamp(now()) | int) % (interval_val | int) == 0 }}"

  - action: select.select_option
    target:
      entity_id: !input battery_mode_select
    data:
      option: "mqtt_ctrl"

  - action: number.set_value
    target:
      entity_id: !input battery_power_limit_number
    data:
      value: >-
        {% set grid_p = states(grid_ent) | float(0) %}
        {% set current_soc = states(soc_ent) | float(0) %}
        {% set current_limit = states(limit_ent) | float(0) %}
        {% set max_chg = chg_val | float * -1 %}
        {% set max_dis = dis_val | float %}
        {% set gain = gain_val | float %}
        {% set deadband = deadband_val | float %}
        
        {# Filter: Wenn Wert in Totzone, keine Korrektur #}
        {% if grid_p | abs < deadband %}
          {% set correction = 0 %}
        {% else %}
          {# Sanfte Annäherung #}
          {% set correction = (grid_p * gain) %}
        {% endif %}
        
        {% set raw_limit = (current_limit + correction) | round(0) | int %}
        
        {# SoC Schutz #}
        {% if current_soc <= min_soc_val|float %}
          {% set raw_limit = [0, raw_limit] | min %}
        {% endif %}
        
        {# Grenzen #}
        {% set limited = ([max_chg | int, ([max_dis | int, raw_limit] | min)] | max) %}
        
        {# Hysterese gegen Zappeln: Nur senden wenn Änderung > 5W oder Watchdog #}
        {% if (limited - current_limit | int) | abs < 5 %}
          {# Watchdog-Zwangsmeldung alle X Sekunden falls Wert gleichbleibt #}
          {{ ((limited + 1) if limited < max_dis else (limited - 1)) | int }}
        {% else %}
          {{ limited | int }}
        {% endif %}
